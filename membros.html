<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membros — Painel</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none'%3E%3Ccircle cx='16' cy='11' r='5' stroke='%23ff3c6e' stroke-width='2'/%3E%3Cpath d='M6 26c0-5.523 4.477-10 10-10s10 4.477 10 10' stroke='%23ff3c6e' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --card2: #1a1a24;
      --accent: #ff3c6e;
      --green: #22c55e;
      --yellow: #facc15;
      --red: #ef4444;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 24px;
    }

    /* ── LOGIN ── */
    #login-screen {
      max-width: 380px;
      margin: 100px auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
    }

    #login-screen .logo {
      width: 48px; height: 48px;
      background: rgba(255,60,110,0.12);
      border: 1px solid rgba(255,60,110,0.3);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }

    #login-screen h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 22px; font-weight: 800;
      margin-bottom: 6px;
    }

    #login-screen p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    #login-error {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    /* ── APP ── */
    #app { display: none; max-width: 1100px; margin: 0 auto; }

    /* ── HEADER ── */
    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 24px; font-weight: 800;
      margin-bottom: 4px;
    }

    .subtitle { color: var(--muted); font-size: 13px; }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
    }

    .stat-label { color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .stat-value { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800; line-height: 1; }
    .stat-value.green { color: var(--green); }
    .stat-value.red { color: var(--red); }
    .stat-value.yellow { color: var(--yellow); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      padding: 11px 14px 11px 40px;
      outline: none;
      transition: border-color .2s;
    }

    .search-wrap input:focus { border-color: var(--border-hover); }
    .search-wrap input::placeholder { color: var(--muted); }

    select.filter {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      padding: 11px 14px;
      outline: none;
      cursor: pointer;
    }

    /* ── TABELA ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 14px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    tbody td {
      padding: 16px 20px;
      font-size: 14px;
      vertical-align: middle;
    }

    .user-info { display: flex; flex-direction: column; gap: 2px; }
    .user-name { font-weight: 600; font-size: 14px; }
    .user-email { color: var(--muted); font-size: 12px; }

    /* ── BADGES ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    .badge-ativo    { background: rgba(34,197,94,.12);  border: 1px solid rgba(34,197,94,.3);  color: var(--green); }
    .badge-inativo  { background: rgba(239,68,68,.12);  border: 1px solid rgba(239,68,68,.3);  color: var(--red); }
    .badge-mensal        { background: rgba(255,60,110,.1); border: 1px solid rgba(255,60,110,.35); color: #ff3c6e; }
    .badge-anual         { background: rgba(255,60,110,.1); border: 1px solid rgba(255,60,110,.35); color: #ff3c6e; }
    .badge-premium       { background: rgba(251,191,36,.1); border: 1px solid rgba(251,191,36,.4);  color: #fbbf24; }
    .badge-premium-anual { background: rgba(251,191,36,.1); border: 1px solid rgba(251,191,36,.4);  color: #fbbf24; }
    .badge-vencido  { background: rgba(239,68,68,.08);  border: 1px solid rgba(239,68,68,.2);  color: #f87171; }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* vencimento */
    .vence-ok     { color: var(--text); }
    .vence-alerta { color: var(--yellow); }
    .vence-vencido{ color: var(--red); }

    /* ── AÇÕES ── */
    .actions { display: flex; gap: 6px; align-items: center; }

    /* ── BOTÕES ── */
    button, .btn {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }

    button:hover, .btn:hover { opacity: .85; transform: translateY(-1px); }
    button:active, .btn:active { transform: translateY(0); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      padding: 11px 20px;
      font-size: 13px;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      font-size: 12px;
      border-radius: 10px;
    }

    .btn-icon {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 34px; height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .btn-icon:hover { color: var(--text); }

    .btn-danger-ghost {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--red);
      padding: 8px 14px;
      font-size: 12px;
      border-radius: 10px;
    }

    .btn-success-ghost {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      color: var(--green);
      padding: 8px 14px;
      font-size: 12px;
      border-radius: 10px;
    }

    /* ── EMPTY ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty svg { margin-bottom: 12px; opacity: .3; }
    .empty p { font-size: 14px; }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      width: 100%;
      max-width: 460px;
      position: relative;
      animation: slideUp .25s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 18px; font-weight: 800;
      margin-bottom: 6px;
    }

    .modal .modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

    .modal-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px; height: 32px;
      border-radius: 8px;
      font-size: 18px;
      line-height: 1;
    }

    /* ── FORM ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input, .field select {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      padding: 12px 14px;
      outline: none;
      transition: border-color .2s;
    }

    .field input:focus, .field select:focus { border-color: rgba(255,60,110,0.5); }
    .field input::placeholder { color: var(--muted); }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-error {
      display: none;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: var(--red);
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .modal-footer .btn-primary { flex: 1; padding: 13px; }

    /* ── LOADING ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 20px;
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      transition: transform .3s ease;
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(34,197,94,.4); color: var(--green); }
    #toast.error   { border-color: rgba(239,68,68,.4); color: var(--red); }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      body { padding: 20px 16px; }
      h1 { font-size: 20px; }

      .stats-row { grid-template-columns: repeat(2, 1fr); }

      .table-wrap { border-radius: 16px; overflow-x: auto; }

      table { min-width: 560px; }

      .header-row { flex-direction: column; gap: 12px; }
      .header-row .btn-primary { width: 100%; }

      .field-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 400px) {
      .stats-row { grid-template-columns: 1fr 1fr; gap: 8px; }
      .stat-value { font-size: 22px; }
    }

  /* ── CONFIG MODAL ── */
  .config-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; padding: 24px;
  }
  .config-overlay.open { display: flex; }
  .config-modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px 28px;
    width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto;
  }
  .config-modal h3 {
    font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 800;
    margin-bottom: 4px;
  }
  .config-modal .cm-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .config-section-title {
    font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); margin: 20px 0 12px;
  }
  .config-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .config-field label {
    display: block; font-family: 'Outfit', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .config-field input {
    width: 100%; padding: 10px 14px;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .config-field input:focus { border-color: rgba(255,60,110,0.5); }
  .config-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn-config-save {
    flex: 1; padding: 13px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .btn-config-save:hover { opacity: 0.88; }
  .btn-config-cancel {
    padding: 13px 20px; border-radius: 12px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-family: 'Outfit', sans-serif;
    font-size: 14px; cursor: pointer; transition: all 0.2s;
  }
  .btn-config-cancel:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .config-saved {
    display: none; text-align: center; font-size: 13px;
    color: var(--green); margin-top: 10px;
  }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="8" r="4" stroke="#ff3c6e" stroke-width="1.8"/>
      <path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="#ff3c6e" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>Gestão de Membros</h1>
  <p>Acesso restrito ao administrador</p>
  <div id="login-error"></div>
  <div class="field">
    <input type="email" id="admin-email" placeholder="Email"
      onkeydown="if(event.key==='Enter') doLogin()" autocomplete="email">
  </div>
  <div class="field">
    <input type="password" id="admin-pass" placeholder="Senha"
      onkeydown="if(event.key==='Enter') doLogin()" autocomplete="current-password">
  </div>
  <button class="btn btn-primary" style="width:100%;padding:13px" onclick="doLogin()">
    <span id="login-label">Entrar</span>
    <div class="spinner" id="login-spinner" style="display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto"></div>
  </button>
</div>

<!-- ── APP ── -->
<div id="app">

  <!-- Header -->
  <div class="header-row">
    <div>
      <h1>Membros</h1>
      <div class="subtitle">Gerencie usuários, planos e acessos</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="btn" style="background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;" onclick="openConfig()" onmouseover="this.style.borderColor='rgba(255,255,255,0.2)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1a6 6 0 100 12A6 6 0 007 1zM7 4v3l2 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Configurações
      </button>
      <button class="btn btn-primary" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Novo membro
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ativos</div>
      <div class="stat-value green" id="stat-ativos">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Inativos</div>
      <div class="stat-value red" id="stat-inativos">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Vencendo em 7d</div>
      <div class="stat-value yellow" id="stat-vencendo">—</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10.5 10.5L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search" placeholder="Buscar por nome ou email…" oninput="renderTable()">
    </div>
    <select class="filter" id="filter-status" onchange="renderTable()">
      <option value="">Todos os status</option>
      <option value="ativo">Ativo</option>
      <option value="inativo">Inativo</option>
    </select>
    <select class="filter" id="filter-plano" onchange="renderTable()">
      <option value="">Todos os planos</option>
      <option value="mensal">Básico Mensal</option>
      <option value="anual">Básico Anual</option>
      <option value="premium">Premium Mensal</option>
      <option value="premium-anual">Premium Anual</option>
    </select>
  </div>

  <!-- Tabela -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Membro</th>
          <th>Plano</th>
          <th>Status</th>
          <th>Telas</th>
          <th>Vencimento</th>
          <th>Cadastro</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<!-- ── MODAL NOVO / EDITAR ── -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 id="modal-title">Novo membro</h2>
    <div class="modal-sub" id="modal-sub">Cria o usuário no Firebase Auth e no Firestore automaticamente.</div>

    <div class="modal-error" id="modal-error"></div>

    <div class="field" id="field-email-wrap">
      <label>Email</label>
      <input type="email" id="f-email" placeholder="cliente@email.com">
    </div>
    <div class="field" id="field-pass-wrap">
      <label>Senha inicial</label>
      <input type="password" id="f-pass" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="field">
      <label>Nome</label>
      <input type="text" id="f-nome" placeholder="Nome do cliente">
    </div>
    <div class="field">
      <label>WhatsApp</label>
      <input type="tel" id="f-telefone" placeholder="(47) 99999-9999">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Plano</label>
        <select id="f-plano">
          <option value="mensal">Básico Mensal</option>
          <option value="anual">Básico Anual</option>
          <option value="premium">Premium Mensal</option>
          <option value="premium-anual">Premium Anual</option>
        </select>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="f-status">
          <option value="ativo">Ativo</option>
          <option value="inativo">Inativo</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Vencimento</label>
      <input type="date" id="f-vence">
    </div>

    <div class="modal-footer">
      <button class="btn btn-primary" id="modal-btn" onclick="salvarMembro()">
        <span id="modal-btn-label">Criar membro</span>
        <div class="spinner" id="modal-spinner"></div>
      </button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- ── FIREBASE SDK ── -->
<script type="module">
  import { initializeApp }                         from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
                                                   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, deleteDoc, serverTimestamp, Timestamp, onSnapshot }
                                                   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // ── CONFIG — substitua pelos seus valores do firebase.js ──
  const firebaseConfig = {
    apiKey:            "AIzaSyAuPS32OoQtQIQBO6LfEfYn2T5J6xTTxHY",
    authDomain:        "painel-interativo-saas.firebaseapp.com",
    projectId:         "painel-interativo-saas",
    storageBucket:     "painel-interativo-saas.firebasestorage.app",
    messagingSenderId: "962909096330",
    appId:             "1:962909096330:web:d446a082bce21a0447a073",
  };

  // Email do administrador — único com acesso permitido
  const ADMIN_EMAIL = "natanael.fuques@gmail.com";

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ── estado global ──
  let members = [];
  let editUID = null;
  let presencas = {};
  let unsubPresencas = {};

  // Verifica se já está logado
  auth.onAuthStateChanged(user => {
    if (user && user.email === ADMIN_EMAIL) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      carregarMembros();
    }
  });

  // ═══════════════════════════════
  //  LOGIN FIREBASE
  // ═══════════════════════════════
  window.doLogin = async function() {
    const email = document.getElementById('admin-email').value.trim();
    const pass  = document.getElementById('admin-pass').value;
    const err   = document.getElementById('login-error');
    const label   = document.getElementById('login-label');
    const spinner = document.getElementById('login-spinner');
    err.style.display = 'none';

    if (!email || !pass) {
      err.textContent = 'Preencha email e senha.';
      err.style.display = 'block';
      return;
    }

    label.style.display = 'none';
    spinner.style.display = 'block';

    try {
      const cred = await signInWithEmailAndPassword(auth, email, pass);
      if (cred.user.email !== ADMIN_EMAIL) {
        await auth.signOut();
        throw { code: 'auth/unauthorized' };
      }
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      carregarMembros();
    } catch(e) {
      const msgs = {
        'auth/invalid-credential':  'Email ou senha incorretos.',
        'auth/user-not-found':      'Email ou senha incorretos.',
        'auth/wrong-password':      'Email ou senha incorretos.',
        'auth/invalid-email':       'Email inválido.',
        'auth/unauthorized':        'Acesso não permitido para este email.',
        'auth/too-many-requests':   'Muitas tentativas. Tente novamente mais tarde.',
      };
      err.textContent = msgs[e.code] || 'Erro ao entrar. Tente novamente.';
      err.style.display = 'block';
      label.style.display = 'block';
      spinner.style.display = 'none';
    }
  };

  // ═══════════════════════════════
  //  CARREGAR MEMBROS
  // ═══════════════════════════════
  async function carregarMembros() {
    const snap = await getDocs(collection(db, 'usuarios'));
    members = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
    atualizarStats();
    renderTable();
    members.forEach(m => escutarPresenca(m.uid));
  }

  function escutarPresenca(uid) {
    if (unsubPresencas[uid]) return;
    unsubPresencas[uid] = onSnapshot(
      collection(db, 'eventos', uid, 'presencas'),
      (snap) => {
        presencas[uid] = snap.size;
        const cell = document.getElementById(`telas-${uid}`);
        if (cell) {
          cell.textContent = snap.size > 0 ? snap.size : '—';
          cell.style.color = snap.size > 0 ? 'var(--green)' : 'var(--muted)';
          cell.style.fontWeight = snap.size > 0 ? '700' : '400';
        }
      }
    );
  }

  function atualizarStats() {
    const agora = new Date();
    const em7   = new Date(agora); em7.setDate(em7.getDate() + 7);

    let ativos = 0, inativos = 0, vencendo = 0;
    members.forEach(m => {
      if (m.status === 'ativo') ativos++; else inativos++;
      if (m.venceEm) {
        const v = m.venceEm.toDate ? m.venceEm.toDate() : new Date(m.venceEm);
        if (v >= agora && v <= em7 && m.status === 'ativo') vencendo++;
      }
    });

    document.getElementById('stat-total').textContent    = members.length;
    document.getElementById('stat-ativos').textContent   = ativos;
    document.getElementById('stat-inativos').textContent = inativos;
    document.getElementById('stat-vencendo').textContent = vencendo;
  }

  // ═══════════════════════════════
  //  RENDERIZAR TABELA
  // ═══════════════════════════════
  window.renderTable = function() {
    const q  = document.getElementById('search').value.toLowerCase();
    const fs = document.getElementById('filter-status').value;
    const fp = document.getElementById('filter-plano').value;

    let lista = members.filter(m => {
      const nome  = (m.nome  || '').toLowerCase();
      const email = (m.email || '').toLowerCase();
      const okQ   = !q  || nome.includes(q) || email.includes(q);
      const okS   = !fs || m.status === fs;
      const okP   = !fp || m.plano  === fp;
      return okQ && okS && okP;
    });

    const tbody = document.getElementById('tbody');

    if (!lista.length) {
      tbody.innerHTML = `
        <tr><td colspan="6">
          <div class="empty">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="14" r="7" stroke="currentColor" stroke-width="1.8"/>
              <path d="M6 34c0-7.732 6.268-14 14-14s14 6.268 14 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <p>Nenhum membro encontrado</p>
          </div>
        </td></tr>`;
      return;
    }

    tbody.innerHTML = lista.map(m => {
      const agora  = new Date();
      let venceStr = '—';
      let venceClass = 'vence-ok';

      if (m.venceEm) {
        const v = m.venceEm.toDate ? m.venceEm.toDate() : new Date(m.venceEm);
        const diff = Math.ceil((v - agora) / 86400000);
        venceStr = v.toLocaleDateString('pt-BR');
        if (diff < 0)  venceClass = 'vence-vencido';
        else if (diff <= 7) venceClass = 'vence-alerta';
      }

      const criadoStr = m.criadoEm
        ? (m.criadoEm.toDate ? m.criadoEm.toDate() : new Date(m.criadoEm)).toLocaleDateString('pt-BR')
        : '—';

      const planoLabels = {
        'mensal':        'Básico Mensal',
        'anual':         'Básico Anual',
        'premium':       'Premium Mensal',
        'premium-anual': 'Premium Anual',
      };
      const plano  = m.plano  || 'mensal';
      const status = m.status || 'inativo';
      const planoLabel = planoLabels[plano] || plano;
      const badgePlanoClassMap = {
        'mensal':        'badge-mensal',
        'basico':        'badge-mensal',
        'anual':         'badge-anual',
        'basico-anual':  'badge-anual',
        'premium':       'badge-premium',
        'premium-anual': 'badge-premium-anual',
      };
      const badgePlanoClass = badgePlanoClassMap[plano] || 'badge-mensal';

      const badgePlano  = `<span class="badge ${badgePlanoClass}">${planoLabel}</span>`;
      const badgeStatus = `<span class="badge badge-${status}"><span class="dot"></span>${status}</span>`;

      const btnToggle = status === 'ativo'
        ? `<button class="btn btn-danger-ghost"  onclick="toggleStatus('${m.uid}','inativo')">Desativar</button>`
        : `<button class="btn btn-success-ghost" onclick="toggleStatus('${m.uid}','ativo')">Ativar</button>`;

      return `
        <tr>
          <td>
            <div class="user-info">
              <span class="user-name">${m.nome || '—'}</span>
              <span class="user-email">${m.email || '—'}</span>
              ${m.telefone ? `<span style="color:var(--muted);font-size:11px;margin-top:2px;">${m.telefone}</span>` : ''}
            </div>
          </td>
          <td>${badgePlano}</td>
          <td>${badgeStatus}</td>
          <td id="telas-${m.uid}" style="color:var(--muted);font-size:14px">${presencas[m.uid] > 0 ? `<span style="color:var(--green);font-weight:700">${presencas[m.uid]}</span>` : '—'}</td>
          <td class="${venceClass}">${venceStr}</td>
          <td style="color:var(--muted);font-size:13px">${criadoStr}</td>
          <td>
            <div class="actions">
              ${m.telefone ? `<a href="https://wa.me/55${m.telefone.replace(/\D/g,'')}" target="_blank" class="btn btn-icon" title="WhatsApp" style="color:#25d366;border-color:rgba(37,211,102,0.3);background:rgba(37,211,102,0.06);">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
                  <path d="M10 1.5C5.31 1.5 1.5 5.31 1.5 10c0 1.5.39 2.9 1.07 4.13L1.5 18.5l4.5-1.05A8.47 8.47 0 0010 18.5c4.69 0 8.5-3.81 8.5-8.5S14.69 1.5 10 1.5z" stroke="#25d366" stroke-width="1.4" stroke-linejoin="round"/>
                  <path d="M7.5 6.5s-.5 1 .5 2.5c.67 1 1.5 1.83 2.5 2.5 1.5 1 2.5.5 2.5.5l.5-1.5-1.5-.5-.5.5s-.5.5-1.5-.5S9 8.5 9 8.5l.5-.5-.5-1.5-1.5.5z" stroke="#25d366" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </a>` : ''}
              <button class="btn btn-icon" title="Editar" onclick="openEdit('${m.uid}')">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M9.5 2l2.5 2.5-7 7H2.5V9L9.5 2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                </svg>
              </button>
              ${btnToggle}
            </div>
          </td>
        </tr>`;
    }).join('');
  };

  // ═══════════════════════════════
  //  MODAL NOVO
  // ═══════════════════════════════
  window.openModal = function() {
    editUID = null;
    document.getElementById('modal-title').textContent  = 'Novo membro';
    document.getElementById('modal-sub').textContent    = 'Cria o usuário no Firebase Auth e no Firestore automaticamente.';
    document.getElementById('modal-btn-label').textContent = 'Criar membro';
    document.getElementById('field-email-wrap').style.display = 'block';
    document.getElementById('field-pass-wrap').style.display  = 'block';
    document.getElementById('f-email').value  = '';
    document.getElementById('f-pass').value   = '';
    document.getElementById('f-nome').value      = '';
    document.getElementById('f-telefone').value = '';
    document.getElementById('f-plano').value  = 'mensal';
    document.getElementById('f-status').value = 'ativo';
    // default vencimento = 30 dias
    const d = new Date(); d.setDate(d.getDate() + 30);
    document.getElementById('f-vence').value = d.toISOString().split('T')[0];
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('overlay').classList.add('open');
  };

  // ═══════════════════════════════
  //  MODAL EDITAR
  // ═══════════════════════════════
  window.openEdit = function(uid) {
    const m = members.find(x => x.uid === uid);
    if (!m) return;
    editUID = uid;
    document.getElementById('modal-title').textContent  = 'Editar membro';
    document.getElementById('modal-sub').textContent    = 'Atualiza os dados no Firestore.';
    document.getElementById('modal-btn-label').textContent = 'Salvar alterações';
    document.getElementById('field-email-wrap').style.display = 'none';
    document.getElementById('field-pass-wrap').style.display  = 'none';
    document.getElementById('f-nome').value      = m.nome      || '';
    document.getElementById('f-telefone').value = m.telefone   || '';
    document.getElementById('f-plano').value  = m.plano  || 'mensal';
    document.getElementById('f-status').value = m.status || 'ativo';
    if (m.venceEm) {
      const v = m.venceEm.toDate ? m.venceEm.toDate() : new Date(m.venceEm);
      document.getElementById('f-vence').value = v.toISOString().split('T')[0];
    } else {
      document.getElementById('f-vence').value = '';
    }
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('overlay').classList.add('open');
  };

  window.closeModal = function(e) {
    if (e && e.target !== document.getElementById('overlay')) return;
    document.getElementById('overlay').classList.remove('open');
  };

  // ═══════════════════════════════
  //  SALVAR
  // ═══════════════════════════════
  window.salvarMembro = async function() {
    const errEl    = document.getElementById('modal-error');
    const spinner  = document.getElementById('modal-spinner');
    const btnLabel = document.getElementById('modal-btn-label');
    errEl.style.display = 'none';

    const nome     = document.getElementById('f-nome').value.trim();
    const telefone = document.getElementById('f-telefone').value.trim();
    const plano  = document.getElementById('f-plano').value;
    const status = document.getElementById('f-status').value;
    const venceRaw = document.getElementById('f-vence').value;
    const venceEm  = venceRaw ? Timestamp.fromDate(new Date(venceRaw + 'T00:00:00')) : null;

    if (!nome) { showErr('Preencha o nome.'); return; }

    spinner.style.display = 'block';
    btnLabel.style.display = 'none';

    try {
      if (editUID) {
        // ── EDITAR ──
        const dados = { nome, plano, status, telefone };
        if (venceEm) dados.venceEm = venceEm;
        await setDoc(doc(db, 'usuarios', editUID), dados, { merge: true });
        const idx = members.findIndex(m => m.uid === editUID);
        if (idx !== -1) members[idx] = { ...members[idx], ...dados, telefone };
        toast('Membro atualizado!', 'success');
      } else {
        // ── CRIAR ──
        const email = document.getElementById('f-email').value.trim();
        const pass  = document.getElementById('f-pass').value;
        if (!email) { showErr('Preencha o email.'); return; }
        if (pass.length < 6) { showErr('Senha mínima de 6 caracteres.'); return; }

        // 1. Cria no Firebase Auth
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        const uid  = cred.user.uid;

        // 2. Cria documento no Firestore com UID como ID
        const dados = { email, nome, plano, status, telefone, criadoEm: serverTimestamp() };
        if (venceEm) dados.venceEm = venceEm;
        await setDoc(doc(db, 'usuarios', uid), dados);

        members.push({ uid, ...dados, criadoEm: new Date() });
        escutarPresenca(uid);
        toast('Membro criado com sucesso!', 'success');
      }

      atualizarStats();
      renderTable();
      document.getElementById('overlay').classList.remove('open');
    } catch (e) {
      const msg = {
        'auth/email-already-in-use': 'Este email já está cadastrado.',
        'auth/invalid-email':        'Email inválido.',
        'auth/weak-password':        'Senha muito fraca.',
      }[e.code] || e.message;
      showErr(msg);
    } finally {
      spinner.style.display  = 'none';
      btnLabel.style.display = 'block';
    }
  };

  // ═══════════════════════════════
  //  TOGGLE STATUS
  // ═══════════════════════════════
  window.toggleStatus = async function(uid, novoStatus) {
    try {
      await setDoc(doc(db, 'usuarios', uid), { status: novoStatus }, { merge: true });
      const m = members.find(x => x.uid === uid);
      if (m) m.status = novoStatus;
      atualizarStats();
      renderTable();
      toast(novoStatus === 'ativo' ? 'Membro ativado!' : 'Membro desativado!',
            novoStatus === 'ativo' ? 'success' : 'error');
    } catch(e) {
      toast('Erro ao atualizar: ' + (e.code || e.message), 'error');
    }
  };

  // ═══════════════════════════════
  //  HELPERS
  // ═══════════════════════════════
  function showErr(msg) {
    const el = document.getElementById('modal-error');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('modal-spinner').style.display  = 'none';
    document.getElementById('modal-btn-label').style.display = 'block';
  }

  let toastTimer;
  window.toast = function(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  };

  // ── CONFIGURAÇÕES ──
  window.openConfig = async function() {
    document.getElementById('config-overlay').classList.add('open');
    document.getElementById('config-saved').style.display = 'none';
    try {
      const snap = await getDoc(doc(db, 'config', 'planos'));
      if (snap.exists()) {
        const d = snap.data();
        if (d.valores) {
          document.getElementById('cfg-val-basico').value          = d.valores.basico          ?? '';
          document.getElementById('cfg-val-basico-anual').value    = d.valores['basico-anual'] ?? '';
          document.getElementById('cfg-val-premium').value         = d.valores.premium         ?? '';
          document.getElementById('cfg-val-premium-anual').value   = d.valores['premium-anual']?? '';
          document.getElementById('cfg-val-upgrade').value         = d.valores.upgrade         ?? '';
          document.getElementById('cfg-val-upgrade-anual').value   = d.valores['upgrade-anual']?? '';
        }
        if (d.descricoes) {
          document.getElementById('cfg-desc-basico').value         = d.descricoes.basico          ?? '';
          document.getElementById('cfg-desc-basico-anual').value   = d.descricoes['basico-anual'] ?? '';
          document.getElementById('cfg-desc-premium').value        = d.descricoes.premium         ?? '';
          document.getElementById('cfg-desc-premium-anual').value  = d.descricoes['premium-anual']?? '';
          document.getElementById('cfg-desc-upgrade').value        = d.descricoes.upgrade         ?? '';
          document.getElementById('cfg-desc-upgrade-anual').value  = d.descricoes['upgrade-anual']?? '';
        }
      }
    } catch(e) { console.error('Erro ao carregar config:', e); }
  };

  window.closeConfig = function() {
    document.getElementById('config-overlay').classList.remove('open');
  };

  window.saveConfig = async function() {
    const btn = document.getElementById('btn-cfg-save');
    btn.disabled = true; btn.textContent = 'Salvando...';
    try {
      await setDoc(doc(db, 'config', 'planos'), {
        valores: {
          basico:          parseFloat(document.getElementById('cfg-val-basico').value)          || 289.99,
          'basico-anual':  parseFloat(document.getElementById('cfg-val-basico-anual').value)   || 2989.99,
          premium:         parseFloat(document.getElementById('cfg-val-premium').value)        || 389.99,
          'premium-anual': parseFloat(document.getElementById('cfg-val-premium-anual').value)  || 3989.99,
          upgrade:         parseFloat(document.getElementById('cfg-val-upgrade').value)        || 100.00,
          'upgrade-anual': parseFloat(document.getElementById('cfg-val-upgrade-anual').value)  || 1000.00,
        },
        descricoes: {
          basico:          document.getElementById('cfg-desc-basico').value          || 'Painel Interativo — Plano Básico Mensal',
          'basico-anual':  document.getElementById('cfg-desc-basico-anual').value   || 'Painel Interativo — Plano Básico Anual',
          premium:         document.getElementById('cfg-desc-premium').value        || 'Painel Interativo — Plano Premium Mensal',
          'premium-anual': document.getElementById('cfg-desc-premium-anual').value  || 'Painel Interativo — Plano Premium Anual',
          upgrade:         document.getElementById('cfg-desc-upgrade').value        || 'Painel Interativo — Upgrade para Premium',
          'upgrade-anual': document.getElementById('cfg-desc-upgrade-anual').value  || 'Painel Interativo — Upgrade para Premium Anual',
        },
        atualizadoEm: serverTimestamp(),
      });
      document.getElementById('config-saved').style.display = 'block';
      toast('Configurações salvas!');
    } catch(e) {
      toast('Erro ao salvar: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Salvar configurações';
    }
  };
</script>
</body>
</html>
